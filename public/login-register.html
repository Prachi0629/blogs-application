<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scaled=1.0">
    <title>Login/Register Page</title>
<style>.myslides {display: none;}</style>
<link rel="stylesheet" href="http://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
<link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
       <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>

.hello{
    font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
      
}

    
    .container {
background: white;
      padding: 30px;
      border-radius: 10px;
      width: 400px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      
      
    }
    .form-toggle {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .form-toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      background-color: #ddd;
      cursor: pointer;
    }
    .form-toggle button.active {
      background-color: #3498db;
      color: white;
    }
    form {
      display: none;
    }
    form.active {
      display: block;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button[type="submit"] {
      background: #3498db;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div id="status-message"></div>


  

<div class="hello">
<div class="container">
    <div class="form-toggle">
      <button id="showLogin" class="active">Login</button>
      <button id="showRegister">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="active" onsubmit="return false" action="/login" method="POST">

      <input type="email" id="loginEmail" name="email" placeholder="Email" required />
      <input type="password" id="loginPassword" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" action="/register" method="POST">
       <input type="name" id="registerName" name="name" placeholder="Name" required />
      <input type="email" id="registerEmail" name="email" placeholder="Email" required />
      <input type="password" id="registerPassword" name="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>
  </div>
</div>


  <script>
    const showLogin = document.getElementById('showLogin');
    const showRegister = document.getElementById('showRegister');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    // Toggle buttons
    showLogin.addEventListener('click', () => {
      showLogin.classList.add('active');
      showRegister.classList.remove('active');
      loginForm.classList.add('active');
      registerForm.classList.remove('active');
    });

    showRegister.addEventListener('click', () => {
      showRegister.classList.add('active');
      showLogin.classList.remove('active');
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
    });

    // Login handler
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  if (res.redirected) {
    alert('Login successful!');
    window.location.href = res.url;
  } else {
    const text = await res.text();
    alert(text);
  }
});



    // Register handler
    registerForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('registerName').value;
  const email = document.getElementById('registerEmail').value;
  const password = document.getElementById('registerPassword').value;

  const res = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email, password })
  });

  if (res.redirected) {
    return res.redirect('/login-register.html?registered=1'); // redirect with message

    alert('Registration successful!');
    window.location.href = res.url;
  } else {
    const text = await res.text();
    alert(text);
  }
});


  const params = new URLSearchParams(window.location.search);

  if (params.has('registered')) {
    const messageDiv = document.getElementById('status-message');
    messageDiv.innerHTML = "<p style='color: green; text-align: center;'>✅ Registration successful! You can now log in.</p>";
  }

  if (params.get('error') === 'exists') {
    const messageDiv = document.getElementById('status-message');
    messageDiv.innerHTML = "<p style='color: red; text-align: center;'>⚠️ User already exists. Try logging in.</p>";
  }



  </script>
</body>
</html>
